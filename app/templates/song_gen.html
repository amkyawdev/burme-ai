{% extends "base.html" %}

{% block title %}Song Generation - {{ app_name }}{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1 class="page-title">Song Generation</h1>
        <p class="page-subtitle">Create music with AI</p>
    </div>
</div>

<div class="container">
    <div class="glass-card" style="max-width: 800px; margin: 0 auto;">
        <form id="song-form" onsubmit="event.preventDefault(); generateSong();">
            <div class="form-group">
                <label class="form-label" for="prompt">Describe the song</label>
                <textarea id="prompt" class="form-textarea" placeholder="An upbeat electronic dance track with catchy melodies and energetic beats..." required></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="duration">Duration (seconds)</label>
                <input type="number" id="duration" class="form-input" value="30" min="10" max="60" />
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Generate Song</button>
        </form>
        
        <div id="result-container" class="result-container hidden">
            <h3 class="text-center mb-3">Generated Song</h3>
            <div class="text-center">
                <audio id="result-audio" class="result-audio" controls>
                    <source src="" type="audio/mpeg" />
                    Your browser does not support the audio tag.
                </audio>
            </div>
        </div>
    </div>
</div>
{% endblock %}
