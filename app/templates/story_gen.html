{% extends "base.html" %}

{% block title %}Story Generation - {{ app_name }}{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1 class="page-title">Story Generation</h1>
        <p class="page-subtitle">Write creative stories with AI</p>
    </div>
</div>

<div class="container">
    <div class="glass-card" style="max-width: 800px; margin: 0 auto;">
        <form id="story-form" onsubmit="event.preventDefault(); generateStory();">
            <div class="form-group">
                <label class="form-label" for="prompt">Describe your story</label>
                <textarea id="prompt" class="form-textarea" placeholder="A young detective solves a mystery in a small coastal town..." required></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="genre">Genre</label>
                <select id="genre" class="form-select">
                    <option value="general">General Fiction</option>
                    <option value="fantasy">Fantasy</option>
                    <option value="scifi">Science Fiction</option>
                    <option value="romance">Romance</option>
                    <option value="mystery">Mystery</option>
                    <option value="horror">Horror</option>
                    <option value="thriller">Thriller</option>
                    <option value="adventure">Adventure</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="length">Length</label>
                <select id="length" class="form-select">
                    <option value="short">Short</option>
                    <option value="medium">Medium</option>
                    <option value="long">Long</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Generate Story</button>
        </form>
        
        <div id="result-container" class="result-container hidden">
            <div id="result-story" class="result-story"></div>
        </div>
    </div>
</div>
{% endblock %}
